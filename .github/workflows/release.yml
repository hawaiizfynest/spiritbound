# Builds the Windows executable and publishes it as a GitHub Release.
#
# Triggers:
#   - Pushing a version tag like v1.0.0  (GitHub Desktop: create the tag, then
#     push tags). The release is named after the tag.
#   - Manually from the Actions tab via "Run workflow" (enter a version, e.g.
#     v1.0.0-test). No tag needed; useful for a quick build any time.
#
# The icon is rendered procedurally at build time (build_icon.py) to keep the
# repo asset-free, then embedded by PyInstaller.
#
# Written by LJ "HawaiizFynest" Eblacas

name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for this build (e.g. v1.0.0)"
        required: true
        default: "v0.0.0-dev"

# Allow the workflow to create releases and upload assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run the test suite (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python tests/test_logic.py

      - name: Generate the application icon
        run: python build_icon.py

      - name: Build the executable
        # Build from the spec, NOT a bare command: the spec bundles assets/
        # (music + sound effects + sprite art) into the EXE via `datas`, plus
        # the game submodules and the icon. A bare PyInstaller command without
        # --add-data ships a silent EXE with no audio.
        run: pyinstaller Spiritbound.spec

      - name: Determine version label
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "label=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload the build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spiritbound-${{ steps.version.outputs.label }}
          path: dist/Spiritbound.exe
          if-no-files-found: error

      # Publish a Release only for real tag pushes. Manual runs just leave the
      # artifact attached to the workflow run (download from the Actions tab).
      - name: Publish the GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: Spiritbound ${{ steps.version.outputs.label }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/Spiritbound.exe
          body: |
            **Spiritbound: Legends of Aetheria** — ${{ steps.version.outputs.label }}

            Download `Spiritbound.exe` below and run it. The save file is
            written next to the executable. No install required.
